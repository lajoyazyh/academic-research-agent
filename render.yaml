services:
  - type: web
    name: academic-research-agent
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8000
      - key: AGENT_MIN_PAPERS
        value: 3
      - key: AGENT_LOOP_DELAY_SEC
        value: 3
      - key: ARXIV_SEARCH_RETRY_LIMIT
        value: 3
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: research-workspaces
      - key: CORS_ALLOWED_ORIGINS
        sync: false
