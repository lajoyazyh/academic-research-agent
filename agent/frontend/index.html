<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook 风格控制台 - 智能学术综述</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/static/notebooklm.css?v=20260602">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.10.6/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vditor@3.10.6/dist/index.min.js"></script>
</head>
<body data-page="console">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"><i class="fa-solid fa-book-open-reader"></i></span>
      <strong id="consoleTopic">Notebook 研究控制台</strong>
    </div>
    <div class="topbar-right">
      <button class="ghost-btn" id="toolManagerBtn" title="管理 Agent 工具"><i class="fa-solid fa-toolbox"></i> 工具管理</button>
      <button class="ghost-btn" id="themeToggle" title="切换深色模式"><i class="fa-solid fa-moon"></i></button>
      <span class="state-pill"><span id="consoleStateDot" class="status-dot"></span><span id="consoleState">就绪</span></span>
      <button class="ghost-btn" onclick="window.location.href='/'"><i class="fa-solid fa-arrow-left"></i> 返回首页</button>
    </div>
  </header>

  <main class="console-layout">
    <!-- 左侧：来源面板 -->
    <section class="sources-panel">
      <div class="sources-head">
        <h2>来源</h2>
      </div>
      <div class="sources-toolbar">
        <button class="primary-btn" id="searchPaperBtn"><i class="fa-solid fa-wand-magic-sparkles"></i> AI检索论文</button>
        <button class="primary-btn" id="cancelSearchBtn" style="display:none;background:var(--danger);"><i class="fa-solid fa-stop"></i> 停止检索</button>
        <button class="secondary-btn" id="addPaperBtn"><i class="fa-solid fa-plus"></i> 添加论文</button>
        <button class="accent-btn" id="autoRunBtn" title="一键自动完成：规划→搜索→笔记→综述"><i class="fa-solid fa-forward-step"></i> 自动进行</button>
        
        <input type="file" id="pdfFileInput" accept="application/pdf" style="display:none" />
      </div>
      <div class="sources-section">
        <div class="sources-section-head">
          <strong>检索到和添加的论文</strong>
          <span class="chip" id="paperCountChip">0 篇</span>
        </div>
        <div class="list-scroll" id="paperList">
          <div class="empty-state">点击「AI 检索论文」开始。</div>
        </div>
      </div>
      <div class="sources-toolbar" id="generateActions">
        <button class="secondary-btn" id="generateNotesBtn" disabled>生成笔记</button>
        <button class="secondary-btn" id="generateReviewBtn" disabled>生成综述</button>
      </div>
      <div class="status-line"><span id="statusHint">就绪</span></div>
      <div class="sources-section" id="reviewBlock"></div>
    </section>

    <!-- 右侧：内容 + 对话 -->
    <section class="content-panel">
      <div class="content-head">
        <div>
          <h2 id="detailHeader">详情</h2>
          <span class="content-meta" id="detailMeta"></span>
        </div>
        <div class="view-switch">
          <button class="view-btn active" id="viewSummary">摘要</button>
          <button class="view-btn" id="viewTrace">轨迹</button>
          <button class="view-btn" id="viewReport">笔记</button>
          <button class="view-btn" id="viewReview">综述</button>
          <button class="view-btn" id="viewPDF">PDF</button>
          <button class="view-btn" id="viewAnalysis">分析</button>
        </div>
      </div>
      <div class="content-body" id="detailContent">
        <div class="empty-state">请先从左侧选择一篇论文。</div>
      </div>
      <div class="resize-handle" id="resizeHandle"><span></span></div>
      <div class="chat-dock">
        <div class="chat-tabs" id="chatTabs">
          <!-- 动态填充会话标签 + 用量条 -->
        </div>
        <div class="chat-messages" id="chatList">
          <div class="chat-msg">
            <span class="chat-role">AI</span>
            <span>选择论文后可在下方提问。笔记模式和综述模式下可请求修改。</span>
          </div>
        </div>
        <div class="chat-bar">
          <span class="chat-ctx" id="chatContext">当前上下文</span>
          <div class="chat-input-row">
            <input class="chat-input" id="chatInput" placeholder="输入问题，按回车发送" />
            <button class="primary-btn chat-send" id="chatSend">发送</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 关键词编辑弹窗（复用已有逻辑，需保持 HTML 结构不变） -->
  <div class="modal-overlay" id="keywordModal">
    <div class="modal-box" style="max-width:680px;">
      <div class="modal-head">
        <h3>确认关键词</h3>
        <button class="ghost-btn" id="keywordCancel"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <p class="modal-hint" id="keywordTopic"></p>
      <div id="keywordList" class="keyword-list"></div>
      <div class="modal-foot">
        <button class="secondary-btn" id="keywordAdd"><i class="fa-solid fa-plus"></i> 添加关键词</button>
        <button class="primary-btn" id="keywordConfirm"><i class="fa-solid fa-check"></i> 确认并开始搜索</button>
      </div>
    </div>
  </div>
  <!-- 添加论文弹窗（合并 arXiv ID + 本地拖拽上传） -->
  <div class="modal-overlay" id="addPaperModal">
    <div class="modal-box" style="max-width:580px;">
      <div class="modal-head">
        <h3><i class="fa-solid fa-plus"></i> 添加论文</h3>
        <button class="ghost-btn" id="addPaperCancel"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <p class="modal-hint">输入 arXiv ID / 论文链接，或拖拽本地 PDF 文件到下方区域，然后点击「添加」</p>

      <!-- arXiv ID 输入区 -->
      <div class="field-grid" style="margin-bottom:12px;">
        <label>arXiv ID 或论文链接</label>
        <input type="text" id="addPaperArxivInput" placeholder="例如：2301.12345 或 https://arxiv.org/abs/2301.12345" />
      </div>

      <div class="add-paper-divider">
        <span>或</span>
      </div>

      <!-- 拖拽上传区 -->
      <div class="drop-zone" id="addPaperDropZone">
        <div class="drop-zone-content">
          <i class="fa-solid fa-cloud-arrow-up drop-zone-icon"></i>
          <p class="drop-zone-text">拖拽 PDF 文件到此处</p>
          <p class="drop-zone-hint">或点击选择文件</p>
        </div>
        <div class="drop-zone-preview" id="dropZonePreview" style="display:none;">
          <i class="fa-solid fa-file-pdf drop-zone-file-icon"></i>
          <span id="dropZoneFileName"></span>
          <button class="tiny-btn" id="dropZoneClear" title="清除"><i class="fa-solid fa-xmark"></i></button>
        </div>
      </div>

      <div class="modal-foot">
        <button class="secondary-btn" id="addPaperClose">取消</button>
        <button class="primary-btn" id="addPaperSubmitBtn"><i class="fa-solid fa-plus"></i> 添加</button>
      </div>
    </div>
  </div>

  <!-- 工具管理弹窗 -->
  <div class="modal-overlay" id="toolManagerModal" style="display:none;">
    <div class="modal-box" style="max-width:700px; max-height:85vh; overflow-y:auto;">
      <div class="modal-head">
        <h3><i class="fa-solid fa-toolbox"></i> Agent 工具管理</h3>
        <button class="ghost-btn" id="toolManagerClose"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <p class="modal-hint">启用或禁用 Agent 可用的工具。禁用后 Agent 在调研时将无法调用该工具。</p>
      <div class="tool-manager-stats" style="display:flex; gap:16px; margin-bottom:16px;">
        <span class="chip" id="toolEnabledCount">已启用: 0</span>
        <span class="chip" id="toolDisabledCount">已禁用: 0</span>
        <button class="secondary-btn" id="toolResetBtn" style="margin-left:auto;"><i class="fa-solid fa-rotate-left"></i> 恢复默认</button>
      </div>
      <div id="toolManagerList">
        <div class="empty-state">加载工具列表中...</div>
      </div>
      <div class="modal-foot" style="margin-top:16px;">
        <button class="primary-btn" id="toolManagerSave"><i class="fa-solid fa-check"></i> 保存配置</button>
        <button class="secondary-btn" id="toolManagerClose2">关闭</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/notebooklm.js"></script>
</body>
</html>
