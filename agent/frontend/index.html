<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook 风格控制台 - 智能学术综述</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/static/notebooklm.css">
</head>
<body data-page="console">
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><i class="fa-solid fa-book-open-reader"></i></div>
        <div class="brand-title">
          <strong id="consoleTopic">Notebook 研究控制台</strong>
          <span><span id="consoleStateDot" class="status-dot"></span><span id="consoleState">就绪</span></span>
        </div>
      </div>
      <div class="top-actions">
        <button class="ghost-btn" onclick="window.location.href='/'"><i class="fa-solid fa-arrow-left"></i> 返回首页</button>
      </div>
    </header>

    <main class="console-layout">
      <section class="workbench">
        <div class="panel-head">
          <div>
            <h2>来源</h2>
            <div class="panel-subtitle">上方检索与添加论文，中间管理论文列表，下方生成笔记与综述。</div>
          </div>
        </div>

        <div class="panel-body">
          <div class="source-actions">
            <button class="primary-btn" id="searchPaperBtn"><i class="fa-solid fa-wand-magic-sparkles"></i> AI检索论文</button>
            <button class="secondary-btn" id="addPaperBtn"><i class="fa-solid fa-plus"></i> 添加论文</button>
          </div>

          <div class="panel-block" id="paperListBlock">
            <div class="panel-block-head">
              <strong>检索到和添加的论文</strong>
              <span class="chip" id="paperCountChip"><i class="fa-solid fa-check"></i> 0 篇</span>
            </div>
            <div class="list-scroll" id="paperList">
              <div class="empty-state">点击「AI 检索论文」或「添加论文」开始构建来源库。</div>
            </div>
          </div>

          <div class="source-actions" id="generateActions" style="margin-top:0;">
            <button class="secondary-btn" id="generateNotesBtn" disabled><i class="fa-regular fa-file-lines"></i> 生成笔记</button>
            <button class="secondary-btn" id="generateReviewBtn" disabled><i class="fa-regular fa-pen-to-square"></i> 生成综述</button>
          </div>

          <div class="status-line">
            <span id="statusHint"><i class="status-dot live"></i>请先检索论文，再生成笔记与综述</span>
          </div>

          <div class="panel-block" id="reviewBlock"></div>
        </div>
      </section>

      <section class="detail-panel">
        <div class="panel-head">
          <div>
            <h2 id="detailHeader">右侧详情</h2>
            <div class="panel-subtitle" id="detailMeta">点击左侧论文后查看摘要、报告或综述。</div>
          </div>
          <div class="view-switch">
            <button class="tiny-btn active" id="viewSummary"><i class="fa-regular fa-note-sticky"></i> 摘要</button>
            <button class="tiny-btn" id="viewReport"><i class="fa-solid fa-chart-line"></i> 报告</button>
            <button class="tiny-btn" id="viewReview"><i class="fa-solid fa-layer-group"></i> 综述</button>
          </div>
        </div>

        <div class="detail-main">
          <div class="detail-content-wrap">
            <div class="detail-viewport" id="detailContent">
              <div class="empty-state">请先从左侧选择一篇论文，或者切换到综述视图。</div>
            </div>
          </div>

          <div class="chat-dock">
            <div class="chat-list" id="chatList">
              <div class="chat-message">
                <div class="chat-avatar agent"><i class="fa-solid fa-robot"></i></div>
                <div class="chat-bubble">
                  <small>Notebook AI</small>
                  选择一篇论文或切换到综述视图后，可以在这里针对当前内容提问。摘要 / 报告模式下只回答当前论文内容，综述模式下可用于修订。
                </div>
              </div>
            </div>
            <div class="chat-footer">
              <div class="chat-context" id="chatContext">
                <span class="chip"><i class="fa-solid fa-sparkles"></i> 当前上下文</span>
              </div>
              <div class="chat-actions" style="display:flex;justify-content:flex-end;gap:10px;">
                <button class="secondary-btn" id="chatApply" style="display:none;"><i class="fa-solid fa-rotate"></i> 生成修订版</button>
              </div>
              <div class="chat-composer">
                <textarea class="chat-input" id="chatInput" rows="2" placeholder="输入问题，按回车发送"></textarea>
                <button class="primary-btn chat-send" id="chatSend"><i class="fa-solid fa-paper-plane"></i> 发送</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal" id="keywordModal" aria-hidden="true">
    <div class="modal-card">
      <h3>确认关键词</h3>
      <p>这里对应 NotebookLM 的主题确认步骤。你可以继续增删改关键词，再开始检索。</p>
      <div class="planning-block">
        <div class="planning-block-head">
          <strong>AI 关键词规划</strong>
          <button class="secondary-btn" id="keywordAdd" type="button"><i class="fa-solid fa-plus"></i> 添加关键词行</button>
        </div>
        <div class="field-grid">
          <label>
            当前主题
            <input id="keywordTopic" type="text" readonly />
          </label>
        </div>
        <div id="keywordList" class="keyword-plan-list"></div>
      </div>
      <div class="modal-actions">
        <button class="secondary-btn" id="keywordCancel">取消</button>
        <button class="primary-btn" id="keywordConfirm"><i class="fa-solid fa-check"></i> 确认并继续</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/notebooklm.js"></script>
</body>
</html>
