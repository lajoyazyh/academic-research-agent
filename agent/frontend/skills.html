<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills — 智能学术综述助手</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/static/notebooklm.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.10.6/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vditor@3.10.6/dist/index.min.js"></script>
  <style>
    .skills-page { overflow-y:auto; height:100vh; }
    .skills-main { max-width:960px; margin:0 auto; padding:24px 20px 40px; }

    .skills-section { margin-bottom:24px; }
    .skills-section-head {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:12px; padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }
    .skills-section-head h2 {
      margin:0; font-size:16px; font-weight:500; color:var(--text);
      display:flex; align-items:center; gap:8px;
    }
    .stage-icon {
      display:inline-flex; align-items:center; justify-content:center;
      width:28px; height:28px; border-radius:8px; font-size:13px;
    }
    .stage-icon.search { background:#eef2ff; color:#4f46e5; }
    .stage-icon.notes { background:#fef3c7; color:#d97706; }
    .stage-icon.write { background:#ecfdf5; color:#059669; }
    .stage-badge { font-size:12px; color:var(--subtle); font-weight:400; }

    .skills-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
      gap:10px;
    }
    .skill-card {
      background:var(--panel); border:1px solid var(--line);
      border-radius:12px; padding:14px 16px;
      cursor:pointer; transition:box-shadow .15s, border-color .15s;
      display:flex; align-items:center; gap:12px;
      position:relative;
    }
    .skill-card:hover { box-shadow:0 2px 8px rgba(0,0,0,.06); border-color:var(--accent); }
    .skill-card-icon {
      width:36px; height:36px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:15px; flex-shrink:0;
    }
    .skill-card-icon.search { background:#eef2ff; color:#4f46e5; }
    .skill-card-icon.notes { background:#fef3c7; color:#d97706; }
    .skill-card-icon.write { background:#ecfdf5; color:#059669; }
    .skill-card-body { flex:1; min-width:0; }
    .skill-card-body h4 {
      margin:0 0 2px; font-size:13px; font-weight:500; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .skill-card-body .skill-card-meta {
      font-size:11px; color:var(--subtle);
      display:flex; align-items:center; gap:6px;
    }
    .skill-card-body .skill-card-preview {
      font-size:11px; color:var(--muted);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width:200px; margin-top:2px;
    }
    .skill-card-delete {
      position:absolute; top:6px; right:6px;
      width:22px; height:22px; border-radius:6px; border:none;
      background:transparent; color:var(--muted); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:11px; opacity:0; transition:opacity .15s, background .15s;
    }
    .skill-card:hover .skill-card-delete { opacity:1; }
    .skill-card-delete:hover { background:#fef2f2; color:var(--danger); }

    .skills-empty {
      grid-column:1 / -1;
      padding:28px 16px; text-align:center;
      color:var(--muted); font-size:13px;
      border:1px dashed var(--line); border-radius:12px;
      background:var(--bg);
    }
    .skills-empty i { margin-right:6px; }

    /* 默认 Skill 卡片样式 */
    .skill-card-default {
      border-style: dashed;
      border-color: var(--accent);
      background: var(--accent-light, rgba(11,87,208,.04));
    }
    .skill-card-default:hover {
      border-color: var(--accent-hover);
      box-shadow: 0 2px 8px rgba(11,87,208,.08);
    }
    .skill-card-default .skill-card-delete { display: none !important; }
    .skill-default-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: var(--accent);
      color: var(--on-primary);
      font-weight: 500;
    }
    .default-icon {
      opacity: .7;
    }

    .skill-form-select, .skill-form-input, .skill-form-textarea {
      width:100%; border:1px solid var(--line); border-radius:10px;
      padding:8px 12px; font-size:13px; background:var(--bg); color:var(--text);
      outline:none; transition:border-color .15s;
      font-family:inherit;
    }
    .skill-form-select:focus, .skill-form-input:focus, .skill-form-textarea:focus {
      border-color:var(--accent);
    }
    .skill-form-textarea {
      resize:vertical; min-height:180px;
      font-family:'Cascadia Code','Fira Code',monospace; font-size:12px;
      line-height:1.6;
    }
    .skill-char-count { float:right; font-size:11px; color:var(--muted); margin-top:2px; }
  </style>
</head>
<body data-page="skills" class="skills-page">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"><i class="fa-solid fa-wand-magic-sparkles"></i></span>
      <strong>Skills 管理</strong>
    </div>
    <div class="topbar-right">
      <button class="ghost-btn" id="themeToggle" title="切换深色模式"><i class="fa-solid fa-moon"></i></button>
      <button class="ghost-btn" onclick="window.location.href='/'"><i class="fa-solid fa-arrow-left"></i> 返回首页</button>
    </div>
  </header>

  <main class="skills-main">

    <section class="skills-section">
      <div class="skills-section-head">
        <h2>
          <span class="stage-icon search"><i class="fa-solid fa-magnifying-glass"></i></span>
          AI 检索论文
          <span class="stage-badge">搜索阶段</span>
        </h2>
        <button class="primary-btn" onclick="notebooklm.openCreateModal('search')" style="font-size:12px;padding:6px 14px;">
          <i class="fa-solid fa-plus"></i> 创建
        </button>
      </div>
      <div class="skills-grid" id="skillsGridSearch"></div>
    </section>

    <section class="skills-section">
      <div class="skills-section-head">
        <h2>
          <span class="stage-icon notes"><i class="fa-solid fa-note-sticky"></i></span>
          笔记生成
          <span class="stage-badge">笔记阶段</span>
        </h2>
        <button class="primary-btn" onclick="notebooklm.openCreateModal('notes')" style="font-size:12px;padding:6px 14px;">
          <i class="fa-solid fa-plus"></i> 创建
        </button>
      </div>
      <div class="skills-grid" id="skillsGridNotes"></div>
    </section>

    <section class="skills-section">
      <div class="skills-section-head">
        <h2>
          <span class="stage-icon write"><i class="fa-solid fa-pen-to-square"></i></span>
          综述生成
          <span class="stage-badge">综述阶段</span>
        </h2>
        <button class="primary-btn" onclick="notebooklm.openCreateModal('write')" style="font-size:12px;padding:6px 14px;">
          <i class="fa-solid fa-plus"></i> 创建
        </button>
      </div>
      <div class="skills-grid" id="skillsGridWrite"></div>
    </section>

  </main>

  <div class="modal" id="skillModal" aria-hidden="true">
    <div class="modal-card" style="max-width:800px;">
      <h3 id="skillModalTitle">创建 Skill</h3>
      <p id="skillModalDesc" style="font-size:13px;color:var(--subtle);margin-bottom:12px;">自定义提示词模板，控制 Agent 在特定阶段的行为策略。留空则使用系统默认策略。</p>

      <div style="display:flex;flex-direction:column;gap:10px;">
        <div style="display:flex;gap:12px;">
          <label style="flex:1;display:flex;flex-direction:column;gap:3px;font-size:13px;font-weight:500;">
            类型 <span style="color:var(--danger);font-weight:400;">*</span>
            <select id="skillTypeSelect" class="skill-form-select">
              <option value="search">AI 检索论文（搜索阶段）</option>
              <option value="notes">笔记生成（笔记阶段）</option>
              <option value="write">综述生成（综述阶段）</option>
            </select>
          </label>
          <label style="flex:1;display:flex;flex-direction:column;gap:3px;font-size:13px;font-weight:500;">
            标题 <span style="color:var(--danger);font-weight:400;">*</span>
            <input id="skillTitleInput" class="skill-form-input" type="text" placeholder="为 Skill 起一个易于区分的名称" maxlength="100" />
          </label>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:13px;font-weight:500;">内容 (Markdown) <span style="color:var(--danger);font-weight:400;">*</span></span>
          <div style="display:flex;gap:6px;">
            <button class="secondary-btn" id="skillShowDefaultBtn" style="font-size:11px;padding:4px 10px;" type="button">
              <i class="fa-solid fa-eye"></i> 查看默认
            </button>
            <span id="skillCharCount" style="font-size:11px;color:var(--muted);">0 / 16384</span>
          </div>
        </div>

        <!-- Vditor 编辑器容器 -->
        <div id="skillContentInput" style="display:none;"></div>
        <div id="skillEditorContainer" style="min-height:320px;border:1px solid var(--line);border-radius:10px;overflow:hidden;"></div>
      </div>

      <div class="modal-actions" style="margin-top:14px;">
        <button class="ghost-btn" id="skillDeleteBtn" style="display:none;color:var(--danger);margin-right:auto;" type="button">
          <i class="fa-solid fa-trash"></i> 删除
        </button>
        <button class="secondary-btn" id="skillCancelBtn">取消</button>
        <button class="primary-btn" id="skillSaveBtn"><i class="fa-solid fa-check"></i> 保存</button>
      </div>
    </div>
  </div>

  <!-- 默认 Skill 查看弹窗 -->
  <div class="modal" id="skillDefaultModal" aria-hidden="true">
    <div class="modal-card" style="max-width:700px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <h3 style="margin:0;">默认策略 — <span id="skillDefaultTitle"></span></h3>
        <button class="secondary-btn" id="skillDefaultUseBtn" style="font-size:12px;padding:5px 12px;">
          <i class="fa-solid fa-copy"></i> 使用此内容
        </button>
      </div>
      <div id="skillDefaultContent" style="max-height:55vh;overflow-y:auto;padding:12px;background:var(--bg);border-radius:10px;font-size:13px;line-height:1.7;white-space:pre-wrap;font-family:inherit;"></div>
      <div class="modal-actions" style="margin-top:14px;">
        <button class="secondary-btn" id="skillDefaultCloseBtn">关闭</button>
      </div>
    </div>
  </div>

  <div class="modal" id="skillDeleteModal" aria-hidden="true">
    <div class="modal-card" style="max-width:400px;">
      <h3>删除 Skill</h3>
      <p id="skillDeleteMsg">确定要删除此 Skill 吗？此操作不可撤销。</p>
      <p id="skillDeleteUsage" style="font-size:12px;color:var(--subtle);"></p>
      <div class="modal-actions">
        <button class="secondary-btn" id="skillDeleteCancelBtn">取消</button>
        <button class="primary-btn" id="skillDeleteConfirmBtn" style="background:var(--danger);">确认删除</button>
      </div>
    </div>
  </div>

  <script src="/static/runtime-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/static/api-client.js"></script>
  <script src="/static/auth-ui.js"></script>
  <script src="/static/notebooklm.js?v=20260612a"></script>
</body>
</html>
