<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能学术综述助手</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/static/notebooklm.css">
</head>
<body data-page="home">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"><i class="fa-solid fa-wave-square"></i></span>
      <strong>智能学术综述助手</strong>
    </div>
  </header>

  <main class="home-main">
    <section class="home-section">
      <div class="home-section-head">
        <h2>最近打开过的综述</h2>
      </div>
      <div class="home-grid" id="homeRail"></div>
    </section>

    <section class="home-section">
      <div class="home-section-head">
        <h2>使用指南</h2>
      </div>
      <div class="home-grid" id="guideRail">
        <article class="home-card home-card--ghost" role="button" tabindex="0" onclick="window.location.href='/app/help'" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();window.location.href='/app/help';}">
          <div class="home-card-inner">
            <span class="home-card-icon"><i class="fa-solid fa-circle-info"></i></span>
            <span class="home-card-label">使用指南</span>
          </div>
        </article>
      </div>
    </section>
  </main>

  <div class="modal" id="topicModal" aria-hidden="true">
    <div class="modal-card">
      <h3>新建综述</h3>
      <p>先输入主题，再由系统生成 AI 关键词规划；确认后直接进入控制台开始检索。</p>
      <div class="field-grid">
        <label>
          主题
          <input id="topicInput" type="text" placeholder="例如：多智能体协作记忆机制" />
        </label>
        <label>
          关键词种子（可选）
          <textarea id="keywordInput" rows="4" placeholder="例如：memory, retrieval, agent planning, RAG"></textarea>
        </label>
      </div>
      <div class="planning-block">
        <div class="planning-block-head">
          <strong>AI 关键词规划</strong>
          <div class="planning-actions">
            <button class="secondary-btn" id="keywordAddHome" type="button"><i class="fa-solid fa-plus"></i> 添加关键词行</button>
            <button class="secondary-btn" id="keywordPlanGenerate" type="button"><i class="fa-solid fa-wand-magic-sparkles"></i> 生成规划</button>
          </div>
        </div>
        <div id="homeKeywordList" class="keyword-plan-list">
          <div class="keyword-plan-empty">输入主题后点击“生成规划”，系统会先给出可编辑的关键词建议。</div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="secondary-btn" id="topicCancel">取消</button>
        <button class="primary-btn" id="topicSubmit"><i class="fa-solid fa-arrow-right"></i> 进入控制台</button>
      </div>
    </div>
  </div>

  <script src="/static/notebooklm.js"></script>
</body>
</html>
