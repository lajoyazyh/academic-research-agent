<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能学术综述助手</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/static/notebooklm.css">
</head>
<body data-page="home">
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><i class="fa-solid fa-wave-square"></i></div>
        <div class="brand-title">
          <strong>智能学术综述助手</strong>
          <span>最近打开过的综述、快速新建、进入历史</span>
        </div>
      </div>
    </header>

    <section class="section">
      <div class="section-head">
        <div>
          <h2>最近打开过的综述</h2>
        </div>
      </div>
      <div class="rail" id="homeRail"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h2>使用指南</h2>
        </div>
      </div>
      <div class="guide-card guide-entry">
        <div></div>
        <div class="meta-row">
          <button class="primary-btn" onclick="window.location.href='/app/help'">使用指南</button>
        </div>
      </div>
    </section>
  </div>

  <div class="modal" id="topicModal" aria-hidden="true">
    <div class="modal-card">
      <h3>新建综述</h3>
      <p>输入主题后会创建新的会话，并跳转到 Notebook 风格控制台完成关键词确认和论文检索。</p>
      <div class="field-grid">
        <label>
          主题
          <input id="topicInput" type="text" placeholder="例如：多智能体协作记忆机制" />
        </label>
        <label>
          关键词提示（可选）
          <textarea id="keywordInput" rows="4" placeholder="例如：memory, retrieval, agent planning, RAG"></textarea>
        </label>
      </div>
      <div class="modal-actions">
        <button class="secondary-btn" id="topicCancel">取消</button>
        <button class="primary-btn" id="topicSubmit"><i class="fa-solid fa-arrow-right"></i> 进入控制台</button>
      </div>
    </div>
  </div>

  <script src="/static/notebooklm.js"></script>
</body>
</html>
